<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Irina & Giorgi | Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Playfair Display',serif;}

body{
  background:#0c0c0f;
  color:#fff;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  background:radial-gradient(circle at center,#1a1a1a,#000);
}

.hero h1{
  font-family:'Great Vibes',cursive;
  font-size:64px;
  background:linear-gradient(45deg,#d4af37,#fff,#d4af37);
  -webkit-background-clip:text;
  color:transparent;
  animation:shimmer 4s infinite;
}

.hero p{opacity:.8;margin-top:10px;}

@keyframes shimmer{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.4);}
  100%{filter:brightness(1);}
}

/* FLOATING HEARTS */
.heart{
  position:absolute;
  color:#d4af37;
  animation:float 10s linear infinite;
  opacity:.3;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(.5);}
  100%{transform:translateY(-10vh) scale(1.2);}
}

/* SECTIONS */
section{
  padding:80px 20px;
  text-align:center;
}

h2{
  font-size:32px;
  margin-bottom:20px;
  color:#d4af37;
}

/* GLASS CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
  max-width:400px;
  margin:20px auto;
  border:1px solid rgba(255,255,255,0.1);
}

/* COUNTDOWN */
.countdown{
  font-size:22px;
  letter-spacing:2px;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  max-width:900px;
  margin:auto;
}
.gallery div{
  height:200px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  transition:.3s;
}
.gallery div:hover{
  transform:scale(1.05);
}

/* RSVP */
input,button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}
button{
  background:#d4af37;
  cursor:pointer;
}

/* MUSIC BUTTON */
#musicBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d4af37;
  padding:12px;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Irina & Giorgi</h1>
  <p>September 13, 2026 • Zugdidi, Bagrationi</p>
</div>

<!-- FLOATING HEARTS -->
<script>
for(let i=0;i<25;i++){
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(h);
}
</script>

<!-- DETAILS -->
<section>
  <h2>Details</h2>
  <div class="card">
    <p>We invite you to celebrate our wedding day 💍</p>
    <div class="countdown" id="countdown"></div>
  </div>
</section>

<!-- STORY -->
<section>
  <h2>Our Story</h2>
  <div class="card">
    <p>From first meeting to forever ❤️</p>
  </div>
</section>

<!-- GALLERY -->
<section>
  <h2>Gallery</h2>
  <div class="gallery">
    <div></div>
    <div></div>
    <div></div>
  </div>
</section>

<!-- RSVP -->
<section>
  <h2>RSVP</h2>
  <div class="card">
    <input placeholder="Your Name"/>
    <button onclick="alert('Thank you for RSVP 💛')">Submit</button>
  </div>
</section>

<!-- MUSIC -->
<button id="musicBtn" onclick="toggleMusic()">🎵</button>
<audio id="audio" loop>
  <source src="https://cdn.pixabay.com/audio/2022/10/30/audio_5c7c3c7c8b.mp3" type="audio/mpeg">
</audio>

<script>
// countdown
const target=new Date("2026-09-13").getTime();
setInterval(()=>{
  let now=new Date().getTime();
  let d=target-now;
  document.getElementById("countdown").innerText=
  Math.floor(d/(1000*60*60*24))+" days left";
},1000);

// music
let playing=false;
function toggleMusic(){
  let audio=document.getElementById("audio");
  if(!playing){audio.play();playing=true;}
  else{audio.pause();playing=false;}
}
</script>

</body>
</html>
